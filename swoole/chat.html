<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Swoole Chat</title>
<style>
  body { font-family: monospace; max-width: 600px; margin: 40px auto; padding: 0 16px; }
  #log { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 8px; margin-bottom: 8px; background: #fafafa; }
  .join  { color: green; }
  .leave { color: red; }
  .error { color: orange; }
  .me    { color: blue; }
  input  { width: calc(100% - 70px); padding: 4px; }
  button { width: 64px; padding: 4px; }
  #status { font-size: 12px; color: #888; margin-bottom: 8px; }
</style>
</head>
<body>
<h2>Swoole WebSocket Chat</h2>
<div id="status">Disconnected</div>
<div id="log"></div>
<input id="msg" placeholder='Type a message...' autocomplete="off">
<button onclick="send()">Send</button>

<script>
const username = prompt('Your username:', 'user_' + Math.floor(Math.random() * 1000)) || 'guest';
const ws       = new WebSocket(`ws://localhost:6001?username=${encodeURIComponent(username)}`);
const log      = document.getElementById('log');
const status   = document.getElementById('status');

ws.onopen = () => {
  status.textContent = `Connected as ${username}`;
  status.style.color = 'green';
};

ws.onclose = () => {
  status.textContent = 'Disconnected';
  status.style.color = 'red';
};

ws.onmessage = ({ data }) => {
  const msg = JSON.parse(data);
  const el  = document.createElement('div');

  if (msg.type === 'welcome') {
    el.className = 'join';
    el.textContent = `Welcome ${msg.user}! Online: ${msg.online}`;
  } else if (msg.type === 'join') {
    el.className = 'join';
    el.textContent = `→ ${msg.user} joined. Online: ${msg.online}`;
  } else if (msg.type === 'leave') {
    el.className = 'leave';
    el.textContent = `← ${msg.user} left. Online: ${msg.online}`;
  } else if (msg.type === 'message') {
    el.className = msg.user === username ? 'me' : '';
    el.textContent = `[${msg.user}] ${msg.text}`;
  } else if (msg.type === 'error') {
    el.className = 'error';
    el.textContent = `Error: ${msg.message}`;
  }

  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
};

function send() {
  const input = document.getElementById('msg');
  const text  = input.value.trim();
  if (!text) return;
  ws.send(JSON.stringify({ text }));
  input.value = '';
}

document.getElementById('msg').addEventListener('keydown', e => {
  if (e.key === 'Enter') send();
});
</script>
</body>
</html>
