services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: swoole_app
    volumes:
      - ./app:/var/www/app
      - ./swoole:/var/www/swoole
    ports:
      - "8000:8000"   # Octane / raw Swoole HTTP
      - "6001:6001"   # WebSocket (Phase 3)
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: local
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: swoole_app
      DB_USERNAME: swoole
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - swoole_net
    tty: true

  mysql:
    image: mysql:8.0
    container_name: swoole_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: swoole_app
      MYSQL_USER: swoole
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "swoole", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - swoole_net

  redis:
    image: redis:7-alpine
    container_name: swoole_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - swoole_net

volumes:
  mysql_data:
  redis_data:

networks:
  swoole_net:
    driver: bridge